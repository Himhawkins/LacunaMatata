<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3; url=https://himhawkins.github.io/Portfolio/">
    <title>Portfolio Moved</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
            color: #333;
            text-align: center;
        }
        .container {
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        a {
            color: #007bff;
            text-decoration: none;
            font-weight: bold;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Portfolio Moved</h1>
        <p>This portfolio has been moved to <br>
            <strong>himhawkins.github.io/Portfolio/</strong>
        </p>
        <p>
            <a href="https://himhawkins.github.io/Portfolio/">Click here to visit</a>, 
            if automatic forwarding does not work.
        </p>
        <p><small>Redirecting you in a few seconds...</small></p>
    </div>

    <script>
        // JavaScript fallback for immediate redirection if Meta tag fails
        setTimeout(function() {
            window.location.href = "https://himhawkins.github.io/Portfolio/";
        }, 3000);
    </script>
</body>
</html>
